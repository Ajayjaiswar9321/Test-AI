services:
  - type: web
    name: test-ai-qa-automation
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
